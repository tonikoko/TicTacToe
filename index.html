<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="title"
      content="Spiele das neuste TicTacToe ganz einfach mit zufälligen Anderen!"
    />
    <meta
      name="description"
      content="Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam volu"
    />
    <meta name="keywords" content="TicTacToe, Online, Fremde, Anderen" />
    <meta name="robots" content="index, follow" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Online TicTacToe - Spiele mit Anderen</title>
  </head>
  <body>
    <div class="gap24 marginTop24">
      <h1>Das online TicTacToe Spiel</h1>
      <p>Spiele ganz einfach online mit Anderen</p>
    </div>
    <div class="gap24 boxed">
      <h2>Fang einfach an</h2>
      <form action="/action_page.php">
        <label for="username">Spielname:</label>
        <input type="text" id="username" name="username" /><br /><br />
        <input class="submitButton" type="submit" value="Jetzt Spielen" />
      </form>
    </div>
    <div class="board">
      <div class="cell" id="0"></div>
      <div class="cell" id="1"></div>
      <div class="cell" id="2"></div>
      <div class="cell" id="3"></div>
      <div class="cell" id="4"></div>
      <div class="cell" id="5"></div>
      <div class="cell" id="6"></div>
      <div class="cell" id="7"></div>
      <div class="cell" id="8"></div>
      <div id="popup" class="boxed">
        <h2 id="winner">X gewinnt</h2>
        <button onclick="resetBoard()">Erneut Spiele</button>
      </div>
    </div>
    <script src="script.mjs"></script>
  </body>
</html>
